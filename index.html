<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow - Kelola Kebiasaan dengan Makna</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.02); } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Plus, CheckCircle2, Circle, Flame, Zap, BookOpen, Heart, 
            Coffee, Target, Trash2, Lightbulb, Calendar, User, 
            Award, Settings, Palette, Save, Brain, Timer, Star,
            TrendingUp, Compass, ShieldCheck, Sparkles, Loader2, RefreshCw,
            Moon, Sun, Bell, MessageSquare, ChevronLeft, ChevronRight,
            BrainCircuit, Quote, Wand2, StickyNote, History, Info, 
            Leaf, Rocket, Crown, Mountain, Smile, Edit3
        } = lucide;

        // --- Konfigurasi ---
        const apiKey = ""; // Kosongkan, akan otomatis menggunakan environment
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        const THEMES = {
            modern: 'from-indigo-600 to-purple-600',
            emerald: 'from-emerald-500 to-teal-600',
            sunset: 'from-orange-500 to-rose-500',
            midnight: 'from-slate-800 to-slate-900'
        };

        const AVATARS = ['✨', '🧘', '🔥', '🍀', '🌊', '⚡', '🚀', '🧠', '🌱', '⭐', '🏆', '🦁'];

        // --- Component Tree ---
        const GrowthTree = ({ percentage, darkMode }) => {
            return (
                <div className="flex flex-col items-center justify-center p-4">
                    <svg width="120" height="120" viewBox="0 0 100 100" className="drop-shadow-md">
                        <ellipse cx="50" cy="90" rx="40" ry="8" fill={darkMode ? "#334155" : "#E2E8F0"} />
                        {percentage >= 0 && (
                            <g>
                                <path d="M50 90 Q50 80 55 75" stroke="#4ADE80" strokeWidth="3" fill="none" />
                                <path d="M55 75 Q60 70 58 65 Q53 68 55 75" fill="#4ADE80" />
                            </g>
                        )}
                        {percentage >= 25 && (
                            <g>
                                <path d="M50 90 L50 60" stroke="#78350F" strokeWidth="4" />
                                <path d="M50 75 L40 65" stroke="#78350F" strokeWidth="2" />
                                <path d="M50 70 L60 62" stroke="#78350F" strokeWidth="2" />
                            </g>
                        )}
                        {percentage >= 50 && (
                            <g>
                                <circle cx="50" cy="50" r="18" fill="#22C55E" opacity="0.9" />
                                <circle cx="40" cy="60" r="12" fill="#16A34A" opacity="0.9" />
                                <circle cx="60" cy="60" r="12" fill="#16A34A" opacity="0.9" />
                                <circle cx="50" cy="40" r="12" fill="#4ADE80" opacity="0.9" />
                            </g>
                        )}
                        {percentage >= 75 && (
                            <g>
                                <circle cx="42" cy="48" r="3" fill="#EF4444" />
                                <circle cx="58" cy="45" r="3" fill="#EF4444" />
                                <circle cx="50" cy="60" r="3" fill="#EF4444" />
                                <circle cx="65" cy="55" r="3" fill="#EF4444" />
                                <circle cx="35" cy="55" r="3" fill="#EF4444" />
                            </g>
                        )}
                    </svg>
                    <p className={`text-[10px] font-bold mt-2 uppercase tracking-widest ${darkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                        {percentage < 25 ? "Fase Bibit" : percentage < 50 ? "Tumbuh Ranting" : percentage < 75 ? "Pohon Rindang" : "Siap Panen Makna"}
                    </p>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('habitflow_user_v4_5');
                return saved ? JSON.parse(saved) : {
                    name: 'Sobat Habit',
                    bio: 'Berusaha menjadi 1% lebih baik setiap hari.',
                    avatar: '✨',
                    theme: 'modern',
                    points: 0,
                    level: 1,
                    darkMode: false,
                    aiTitle: 'Newbie',
                    lastResetMonth: new Date().getMonth()
                };
            });

            const [habits, setHabits] = useState(() => {
                const saved = localStorage.getItem('habitflow_habits_v4_5');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Meditasi 2 Menit', streak: 0, completed: false }
                ];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('habitflow_history_v4_5');
                return saved ? JSON.parse(saved) : {};
            });

            const [currentNote, setCurrentNote] = useState('');
            const [newHabitName, setNewHabitName] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [aiSuggestion, setAiSuggestion] = useState(null);
            const [aiLabContent, setAiLabContent] = useState(null);

            // Icon Injection (Lucide needs manual call in HTML version)
            useEffect(() => { lucide.createIcons(); }, [activeTab, habits, aiLabContent]);

            useEffect(() => {
                localStorage.setItem('habitflow_user_v4_5', JSON.stringify(user));
                localStorage.setItem('habitflow_habits_v4_5', JSON.stringify(habits));
                localStorage.setItem('habitflow_history_v4_5', JSON.stringify(history));
            }, [user, habits, history]);

            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const total = habits.length;
                const completedCount = habits.filter(h => h.completed).length;
                let status = 'none';
                let percentage = 0;
                if (total > 0) {
                    percentage = (completedCount / total) * 100;
                    status = percentage === 100 ? 'perfect' : percentage > 0 ? 'partial' : 'none';
                }
                setHistory(prev => ({
                    ...prev,
                    [today]: { ...prev[today], status, percentage }
                }));
            }, [habits]);

            const askGemini = async (prompt, systemInstruction) => {
                setAiLoading(true);
                try {
                    const response = await fetch(GEMINI_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });
                    const result = await response.json();
                    setAiLoading(false);
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    setAiLoading(false);
                    return "Sistem sedang sibuk.";
                }
            };

            const handleAiStacking = async () => {
                if (!newHabitName) return;
                const prompt = `Berikan saran Habit Stacking SANGAT SINGKAT (maks 7 kata) untuk "${newHabitName}". Format: [Trigger] -> [Habit].`;
                const suggestion = await askGemini(prompt, "Jawab dengan bahasa Indonesia, padat, dan jelas.");
                setAiSuggestion(suggestion);
            };

            const handleAiLab = async () => {
                const last7Days = Object.entries(history).slice(-7).map(([date, data]) => `- ${date}: ${data.status}`).join('\n');
                const notes = Object.entries(history).slice(-7).flatMap(([_, data]) => data.notes?.map(n => n.text) || []).join('; ');
                const prompt = `Riwayat 7 hari:\n${last7Days}\nCatatan Kendala: ${notes}\nAnalisislah kendala saya dan berikan 1 solusi psikologis singkat (maks 50 kata).`;
                const content = await askGemini(prompt, "Anda psikolog produktivitas handal.");
                setAiLabContent(content);
            };

            const toggleHabit = (id) => {
                setHabits(habits.map(h => {
                    if (h.id === id) {
                        const isDone = !h.completed;
                        const ptsChange = isDone ? 15 : -15;
                        const newPts = Math.max(0, user.points + ptsChange);
                        setUser(prev => ({ ...prev, points: newPts, level: Math.floor(newPts / 100) + 1 }));
                        return { ...h, completed: isDone, streak: isDone ? h.streak + 1 : Math.max(0, h.streak - 1) };
                    }
                    return h;
                }));
            };

            const todayDate = new Date().toISOString().split('T')[0];
            const dailyProgress = history[todayDate]?.percentage || 0;

            const calendarDays = useMemo(() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    days.push({ day: d, dateStr, history: history[dateStr] });
                }
                return days;
            }, [history]);

            return (
                <div className={`min-h-screen transition-colors duration-500 pb-24 ${user.darkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    <div className="h-1 w-full fixed top-0 z-50 bg-slate-200">
                        <div className={`h-full bg-gradient-to-r ${THEMES[user.theme]} transition-all duration-700`} style={{ width: `${(user.points % 100)}%` }}></div>
                    </div>
                    
                    <div className="max-w-xl mx-auto px-6 pt-10">
                        <header className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${THEMES[user.theme]} flex items-center justify-center text-xl shadow-lg`}>{user.avatar}</div>
                                <div>
                                    <h2 className="text-sm font-bold leading-none">{user.name}</h2>
                                    <p className="text-[9px] text-indigo-500 font-black uppercase mt-1 tracking-widest">{user.aiTitle} ✨</p>
                                </div>
                            </div>
                            <button onClick={() => setActiveTab('profile')} className={`p-2.5 rounded-xl border ${user.darkMode ? 'border-slate-800 bg-slate-800' : 'border-slate-100 bg-white'}`}><i data-lucide="settings" className="w-4 h-4 text-slate-400"></i></button>
                        </header>

                        <main>
                            {activeTab === 'tracker' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                                    <div className={`p-6 rounded-3xl border flex items-center justify-between ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
                                        <div>
                                            <h3 className="text-lg font-bold">Harian</h3>
                                            <div className="flex items-baseline gap-1 mt-1">
                                                <span className="text-3xl font-black text-indigo-500">{Math.round(dailyProgress)}%</span>
                                                <span className="text-xs text-slate-400 font-bold uppercase">Progres</span>
                                            </div>
                                        </div>
                                        <GrowthTree percentage={dailyProgress} darkMode={user.darkMode} />
                                    </div>

                                    <div className={`p-6 rounded-3xl border ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
                                        <div className="flex flex-col gap-3">
                                            <div className="flex gap-2">
                                                <input value={newHabitName} onChange={e => setNewHabitName(e.target.value)} placeholder="Habit baru..." className={`flex-1 px-4 py-3 rounded-2xl outline-none text-sm ${user.darkMode ? 'bg-slate-700 text-white border-transparent' : 'bg-slate-50 border-slate-100 focus:ring-2 focus:ring-indigo-500'}`} />
                                                <button onClick={handleAiStacking} className="p-3 rounded-2xl bg-indigo-50 text-indigo-600"><i data-lucide="sparkles" className="w-5 h-5"></i></button>
                                            </div>
                                            {aiSuggestion && <div className="p-3 rounded-xl border text-xs bg-emerald-50 border-emerald-100 text-emerald-700 font-medium">✨ {aiSuggestion}</div>}
                                            <button onClick={() => { if(newHabitName) setHabits([...habits, {id: Date.now(), name: newHabitName, streak: 0, completed: false}]); setNewHabitName(''); setAiSuggestion(null); }} className={`w-full py-3.5 rounded-2xl text-white font-bold bg-gradient-to-r ${THEMES[user.theme]} shadow-lg`}>Tambah Habit</button>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        {habits.map(h => (
                                            <div key={h.id} className={`p-4 rounded-3xl border flex items-center justify-between ${h.completed ? 'bg-emerald-50/50 border-emerald-100' : user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'}`}>
                                                <div className="flex items-center gap-4">
                                                    <button onClick={() => toggleHabit(h.id)} className={h.completed ? 'text-emerald-500' : 'text-slate-200'}><i data-lucide={h.completed ? "check-circle-2" : "circle"} className="w-7 h-7"></i></button>
                                                    <div>
                                                        <p className={`font-bold text-sm ${h.completed ? 'text-emerald-700 line-through' : ''}`}>{h.name}</p>
                                                        <div className="flex items-center gap-2 text-[9px] font-bold text-orange-500 uppercase"><i data-lucide="flame" className="w-3 h-3"></i> {h.streak} Hari</div>
                                                    </div>
                                                </div>
                                                <button onClick={() => setHabits(habits.filter(x => x.id !== h.id))} className="text-slate-300"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        ))}
                                    </div>

                                    <div className={`p-6 rounded-3xl border ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-sm font-bold flex items-center gap-2"><i data-lucide="calendar" className="w-4 h-4 text-indigo-500"></i> Konsistensi</h3>
                                        </div>
                                        <div className="grid grid-cols-7 gap-1">
                                            {calendarDays.map((d, i) => {
                                                if (!d) return <div key={i} className="aspect-square"></div>;
                                                let color = user.darkMode ? 'bg-slate-700/30' : 'bg-slate-50';
                                                if (d.history?.status === 'perfect') color = 'bg-emerald-400 text-white';
                                                else if (d.history?.status === 'partial') color = 'bg-amber-400 text-white';
                                                return <div key={d.dateStr} className={`aspect-square rounded-lg flex items-center justify-center text-[10px] font-bold ${color}`}>{d.day}</div>;
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'motivation' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                                    <div className={`p-8 rounded-3xl border text-center ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
                                        <div className="w-16 h-16 bg-emerald-100 dark:bg-emerald-950/40 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <i data-lucide="brain-circuit" className="w-10 h-10 text-emerald-500"></i>
                                        </div>
                                        <h2 className="text-xl font-bold mb-1 text-emerald-600">AI Lab ✨</h2>
                                        <p className="text-[10px] text-slate-400 mb-6 px-6">Menganalisis pola perilaku Anda untuk solusi personal.</p>
                                        <button onClick={handleAiLab} disabled={aiLoading} className={`px-6 py-2.5 rounded-xl text-xs text-white font-bold bg-gradient-to-r ${THEMES[user.theme]} flex items-center gap-2 mx-auto shadow-md`}>
                                            {aiLoading ? "Berpikir..." : "Analisis Mindset ✨"}
                                        </button>
                                        
                                        {aiLabContent && (
                                            <div className={`mt-8 p-6 rounded-3xl border-l-8 border-emerald-500 text-left animate-in slide-in-from-top-4 shadow-xl ${user.darkMode ? 'bg-emerald-950/30 text-emerald-100' : 'bg-emerald-50 text-emerald-900'}`}>
                                                <i data-lucide="quote" className="w-6 h-6 text-emerald-400 mb-3 opacity-40"></i>
                                                <p className="text-sm leading-relaxed font-medium italic">{aiLabContent}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'achievements' && (
                                <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4">
                                    <div className={`p-6 rounded-3xl border text-center ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'}`}>
                                        <i data-lucide="award" className="w-8 h-8 text-amber-500 mx-auto mb-2"></i>
                                        <h2 className="text-xl font-bold">Hall of Fame</h2>
                                        <p className="text-[10px] text-indigo-500 font-black uppercase mt-1 tracking-widest">{user.aiTitle} ✨</p>
                                    </div>
                                    {/* Badges simplified for deployment code */}
                                    <p className="text-center text-xs text-slate-400">Streak tertinggi akan membuka lencana otomatis!</p>
                                </div>
                            )}

                            {activeTab === 'profile' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                                    <div className={`p-6 rounded-3xl border ${user.darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
                                        <div className="flex flex-col items-center mb-6">
                                            <div className="w-20 h-20 bg-slate-100 dark:bg-slate-700 rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-inner">{user.avatar}</div>
                                            <input value={user.name} onChange={e => setUser({...user, name: e.target.value})} className="text-center font-bold text-lg bg-transparent border-b border-slate-200 outline-none w-full" />
                                        </div>
                                        <div className="grid grid-cols-6 gap-2 mb-6">
                                            {AVATARS.map(e => <button key={e} onClick={() => setUser({...user, avatar: e})} className="p-2 bg-slate-50 dark:bg-slate-700 rounded-lg">{e}</button>)}
                                        </div>
                                        <button onClick={() => setUser({...user, darkMode: !user.darkMode})} className={`w-full py-3 rounded-xl flex items-center justify-between px-4 ${user.darkMode ? 'bg-slate-700' : 'bg-slate-100'}`}>
                                            <span className="text-xs font-bold">{user.darkMode ? "Mode Terang" : "Mode Gelap"}</span>
                                            <i data-lucide={user.darkMode ? "sun" : "moon"} className="w-4 h-4"></i>
                                        </button>
                                        <div className="flex justify-center gap-3 mt-6">
                                            {Object.keys(THEMES).map(t => <button key={t} onClick={() => setUser({...user, theme: t})} className={`w-8 h-8 rounded-full bg-gradient-to-br ${THEMES[t]}`}></button>)}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    <nav className={`fixed bottom-0 left-0 right-0 border-t px-6 py-3 z-40 backdrop-blur-xl ${user.darkMode ? 'bg-slate-900/90 border-slate-800' : 'bg-white/90 border-slate-100'}`}>
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            {[
                                { id: 'tracker', label: 'Harian', icon: 'calendar' },
                                { id: 'motivation', label: 'Lab AI', icon: 'wand-2' },
                                { id: 'achievements', label: 'Lencana', icon: 'award' },
                                { id: 'profile', label: 'Profil', icon: 'user' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'text-indigo-500 scale-110 font-bold' : 'text-slate-400'}`}>
                                    <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                    <span className="text-[9px] uppercase tracking-tighter">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
